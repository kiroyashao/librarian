common_llm_config: &common_llm_config
  apiKey: API_KEY
  apiBase: API_BASE

llms:
  - name: llm-1
    <<: *common_llm_config
  - name: llm-2
    <<: *common_llm_config

workers:
  ConfigLoader:
    llm: llm-1
  SkillRouter:
    llm: llm-1
  SkillEvaluator:
    llm: llm-2
    qualityThreshold: 0.7
    requireHumanReview: false
    categories:
      - data_analysis
      - access_network
      - web_scraping
      - file_management
  SkillDeduplicator:
    llm: llm-1
  SkillSplitter:
    llm: llm-2
    splitRule:
      maxLines: 1000
      minLines: 100
  SkillPruner:
    expiryDays: 7 # Number of days to keep skills before pruning them. Defaults to 90 days.
  SkillLinkMaintainer:
    llm: llm-1
  ToolSynthesizer:
    llm: llm-2
  ToolGuardian:
    llm: llm-1
    requireHumanReview: true

cronjobs:
  enabled: true
  jobs:
    cleaner:
      schedule: "0 0 */3 * *"
    merger:
      schedule: "0 0 */3 * *"

skillTriggerThreshold: 10
maxRejectionCount: 3

api:
  port: 9112
  host: "0.0.0.0"

database:
  path: "./data/librarian.db"

logging:
  level: "INFO"
  file: "./logs/librarian.log"
